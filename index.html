<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prox Loader</title>
  <meta name="description" content="PROX LOADER" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --fg: #f0f0f5;
      --primary: #7cacf8;
      --muted: #636680;
      --glass: rgba(255,255,255,0.045);
      --glass-hover: rgba(255,255,255,0.09);
      --glass-border: rgba(255,255,255,0.08);
      --glass-border-hover: rgba(255,255,255,0.18);
      --glass-inset: 0 1px 0 rgba(255,255,255,0.06) inset;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.08);
      border-radius: 100px;
      border: 2px solid transparent;
      background-clip: content-box;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); background-clip: content-box; }
    ::-webkit-scrollbar-corner { background: transparent; }
    html { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.08) rgba(255,255,255,0.02); }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    @keyframes float-slow {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -20px) scale(1.05); }
    }
    @keyframes float-slow-r {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-25px, 25px) scale(1.03); }
    }
    @keyframes glow-pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fade-scale {
      from { opacity: 0; transform: translateY(14px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes blur-in {
      from { opacity: 0; filter: blur(10px); transform: translateY(-8px); }
      to { opacity: 1; filter: blur(0); transform: translateY(0); }
    }
    @keyframes shimmer {
      0% { left: -100%; }
      100% { left: 200%; }
    }
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.5; }
      100% { transform: scale(2); opacity: 0; }
    }
    @keyframes skeleton-pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.7; }
    }
    .bg-layer {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; overflow: hidden;
    }
    .orb {
      position: absolute; border-radius: 50%;
      will-change: transform; transform: translateZ(0);
    }
    .orb-1 {
      width: 40vw; height: 40vw; max-width: 450px; max-height: 450px;
      top: -8%; left: -8%;
      background: radial-gradient(circle, rgba(100,150,255,0.08) 0%, transparent 70%);
      animation: float-slow 28s ease-in-out infinite;
    }
    .orb-2 {
      width: 35vw; height: 35vw; max-width: 400px; max-height: 400px;
      bottom: -8%; right: -8%;
      background: radial-gradient(circle, rgba(140,100,255,0.06) 0%, transparent 70%);
      animation: float-slow-r 32s ease-in-out infinite;
    }
    .grid-overlay {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.01) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.01) 1px, transparent 1px);
      background-size: 72px 72px;
    }
    .main {
      position: relative; z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 56px 16px 80px;
    }
    @media (min-width: 640px) { .main { padding: 72px 24px 96px; } }
    .header {
      text-align: center;
      margin-bottom: 56px;
    }
    .logo-row {
      display: flex; align-items: center; justify-content: center;
      gap: 18px; margin-bottom: 40px;
      animation: blur-in 0.9s var(--ease) forwards;
    }
    .logo-box {
      width: 60px; height: 60px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 20px; flex-shrink: 0;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-inset), 0 4px 24px rgba(0,0,0,0.2);
      transition: transform 0.5s var(--ease), box-shadow 0.5s var(--ease), background 0.5s;
    }
    .logo-box:hover {
      transform: scale(1.08) rotate(3deg);
      background: var(--glass-hover);
      box-shadow: var(--glass-inset), 0 8px 40px rgba(124,172,248,0.1);
    }
    .logo-box svg {
      color: var(--primary); width: 28px; height: 28px;
      transition: transform 0.5s var(--ease);
    }
    .logo-box:hover svg { transform: rotate(-6deg) scale(1.1); }
    h1 { font-size: 2.25rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1.1; }
    @media (min-width: 640px) { h1 { font-size: 2.75rem; } }
    .subtitle {
      margin-top: 4px; font-size: 0.65rem; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted);
    }
    .search-wrap {
      position: relative; max-width: 480px;
      margin: 0 auto 28px;
      animation: fade-up 0.7s var(--ease) 0.15s both;
    }
    .search-glow {
      position: absolute; inset: -6px; border-radius: 22px;
      background: transparent;
      transition: background 0.6s var(--ease);
      filter: blur(16px);
      pointer-events: none;
    }
    .search-wrap.focused .search-glow { background: rgba(124,172,248,0.06); }
    .search-box {
      position: relative; overflow: hidden; border-radius: 16px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-inset), 0 2px 12px rgba(0,0,0,0.12);
      transition: background 0.4s, border-color 0.4s, box-shadow 0.5s var(--ease);
    }
    .search-wrap.focused .search-box {
      background: rgba(255,255,255,0.07);
      border-color: rgba(124,172,248,0.25);
      box-shadow: var(--glass-inset), 0 8px 40px rgba(0,0,0,0.2);
    }
    .search-box .edge {
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent 10%, rgba(255,255,255,0.09) 50%, transparent 90%);
      pointer-events: none;
    }
    .search-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; color: var(--muted);
      transition: color 0.3s, transform 0.3s;
    }
    .search-wrap.focused .search-icon { color: var(--primary); transform: translateY(-50%) scale(1.1); }
    .search-box input {
      width: 100%; background: transparent; border: none; outline: none;
      padding: 14px 42px 14px 46px;
      font-size: 0.85rem; color: var(--fg); font-family: inherit;
    }
    .search-box input::placeholder { color: var(--muted); transition: color 0.3s; }
    .search-wrap.focused .search-box input::placeholder { color: rgba(124,172,248,0.4); }
    .clear-btn {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%) scale(0.8);
      width: 28px; height: 28px; border-radius: 50%; border: none; cursor: pointer;
      background: rgba(255,255,255,0.06); color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s var(--ease);
      font-size: 14px; line-height: 1;
      opacity: 0; pointer-events: none;
    }
    .clear-btn:hover { background: rgba(255,255,255,0.12); color: var(--fg); }
    .clear-btn.visible { opacity: 1; pointer-events: auto; transform: translateY(-50%) scale(1); }
    .pills {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
      animation: fade-up 0.7s var(--ease) 0.25s both;
    }
    .pill {
      padding: 7px 18px; border-radius: 9999px;
      font-size: 0.72rem; font-weight: 500; letter-spacing: 0.03em;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.03);
      color: var(--muted); cursor: pointer;
      transition: all 0.35s var(--ease);
      user-select: none; position: relative; overflow: hidden;
    }
    .pill:hover {
      background: rgba(255,255,255,0.06); color: var(--fg);
      transform: translateY(-1px);
    }
    .pill.active {
      background: rgba(124,172,248,0.1);
      border-color: rgba(124,172,248,0.25);
      color: var(--primary);
      box-shadow: 0 0 24px rgba(124,172,248,0.06);
      transform: translateY(-1px);
    }
    .pill:active { transform: scale(0.97); }
    .category { margin-bottom: 48px; }
    .cat-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .cat-label {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 14px; border-radius: 14px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-inset);
    }
    .cat-label .cat-icon { color: var(--primary); opacity: 0.85; display: flex; }
    .cat-label .cat-icon svg { width: 14px; height: 14px; }
    .cat-label span {
      font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.14em; color: rgba(240,240,245,0.85);
    }
    .cat-count {
      padding: 3px 9px; border-radius: 10px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
      font-size: 10px; font-weight: 500; color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .cat-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0.06), transparent);
    }
    .cards-grid {
      display: grid; gap: 10px;
      grid-template-columns: 1fr;
    }
    @media (min-width: 640px) { .cards-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1024px) { .cards-grid { grid-template-columns: repeat(3, 1fr); } }
    .link-card {
      position: relative; display: flex; align-items: center; gap: 14px;
      padding: 14px; border-radius: 14px; overflow: hidden;
      text-decoration: none; color: var(--fg);
      background: var(--glass);
      border: 1px solid var(--glass-border);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08), var(--glass-inset);
      transition: transform 0.4s var(--ease), background 0.4s, border-color 0.4s, box-shadow 0.5s var(--ease);
      animation: fade-scale 0.5s var(--ease) both;
      will-change: transform;
    }
    .link-card:hover {
      background: var(--glass-hover);
      border-color: var(--glass-border-hover);
      transform: translateY(-3px) scale(1.015);
      box-shadow: 0 12px 40px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.05) inset, 0 1px 0 rgba(255,255,255,0.08) inset;
    }
    .link-card:active { transform: translateY(-1px) scale(0.99); transition-duration: 0.15s; }
    .link-card::after {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
      pointer-events: none; opacity: 0;
      transition: opacity 0.3s;
    }
    .link-card:hover::after {
      opacity: 1;
      animation: shimmer 1.2s ease-in-out;
    }
    .link-card .top-edge {
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent 15%, rgba(255,255,255,0.07) 50%, transparent 85%);
      pointer-events: none;
    }
    .favicon-wrap {
      position: relative; flex-shrink: 0;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.04);
      transition: background 0.4s, box-shadow 0.4s, border-color 0.4s;
      overflow: hidden;
    }
    .link-card:hover .favicon-wrap {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.08);
      box-shadow: 0 0 20px rgba(124,172,248,0.06);
    }
    .favicon-wrap img {
      width: 24px; height: 24px; border-radius: 4px;
      transition: transform 0.4s var(--ease);
      image-rendering: -webkit-optimize-contrast;
    }
    .link-card:hover .favicon-wrap img { transform: scale(1.15); }
    .favicon-letter {
      font-size: 18px;
      font-weight: 800;
      color: var(--primary);
      background: linear-gradient(135deg, rgba(124,172,248,0.2), rgba(124,172,248,0.08));
      border-radius: 50%;
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      transition: all 0.35s var(--ease);
    }
    .link-card:hover .favicon-letter {
      transform: scale(1.12);
      box-shadow: 0 0 16px rgba(124,172,248,0.35);
    }
    .card-text { min-width: 0; flex: 1; }
    .card-text .name {
      font-size: 0.82rem; font-weight: 500; line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: color 0.3s;
    }
    .link-card:hover .card-text .name { color: var(--primary); }
    .card-text .domain {
      font-size: 0.68rem; font-family: 'SF Mono', ui-monospace, monospace;
      color: var(--muted); opacity: 0.6;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 2px; transition: opacity 0.3s;
    }
    .link-card:hover .card-text .domain { opacity: 0.85; }
    .ext-icon {
      flex-shrink: 0; width: 13px; height: 13px;
      color: rgba(255,255,255,0.15);
      transition: all 0.4s var(--ease);
    }
    .link-card:hover .ext-icon {
      color: var(--primary); opacity: 0.7;
      transform: translate(2px, -2px);
    }
    .footer {
      margin-top: 64px; display: flex; justify-content: center;
      animation: fade-up 0.7s var(--ease) 0.5s both;
    }
    .footer-inner {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 20px; border-radius: 14px;
      background: var(--glass); border: 1px solid var(--glass-border);
    }
    .footer-dot {
      position: relative;
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--primary);
    }
    .footer-dot::after {
      content: ''; position: absolute; inset: -4px; border-radius: 50%;
      border: 1px solid var(--primary);
      animation: pulse-ring 2.5s ease-out infinite;
    }
    .footer-inner p { font-size: 0.7rem; color: var(--muted); }
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 80px 0; text-align: center;
      animation: fade-scale 0.5s var(--ease) both;
    }
    .empty-icon {
      width: 72px; height: 72px; margin-bottom: 16px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 20px;
      background: var(--glass); border: 1px solid var(--glass-border);
    }
    .empty-icon svg { width: 28px; height: 28px; color: var(--muted); opacity: 0.4; }
    .empty-state p { font-size: 0.85rem; font-weight: 500; color: var(--muted); }
    .empty-state .sub { font-size: 0.72rem; color: var(--muted); opacity: 0.5; margin-top: 4px; }
    .skeleton-grid { display: grid; gap: 10px; grid-template-columns: 1fr; }
    @media (min-width: 640px) { .skeleton-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1024px) { .skeleton-grid { grid-template-columns: repeat(3, 1fr); } }
    .skeleton-card {
      height: 68px; border-radius: 14px;
      background: var(--glass); border: 1px solid var(--glass-border);
      animation: skeleton-pulse 1.5s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="bg-layer" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="grid-overlay"></div>
  </div>
  <div class="main">
    <header class="header">
      <div class="logo-row">
        <div class="logo-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div>
          <h1>Prox Loader</h1>
          <p class="subtitle" id="link-count">Loading links...</p>
        </div>
      </div>
      <div class="search-wrap" id="search-wrap">
        <div class="search-glow"></div>
        <div class="search-box">
          <div class="edge"></div>
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
          </svg>
          <input type="text" id="search-input" placeholder="Search links, categories..." autocomplete="off" />
          <button class="clear-btn" id="clear-btn" aria-label="Clear search">×</button>
        </div>
      </div>
      <div class="pills" id="pills"></div>
    </header>
    <div id="links-container">
      <div class="skeleton-grid">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </div>
    <div class="footer">
      <div class="footer-inner">
        <div class="footer-dot"></div>
        <p id="footer-text">Loading...</p>
      </div>
    </div>
  </div>
  <script>
    const LINKS_URL = "https://raw.githubusercontent.com/epickfr/proxlinksandsuch/refs/heads/main/Version1.0";
    let links = [];
    let activeCategory = "All";
    let searchQuery = "";
    const CATEGORY_ORDER = ["Proxies", "Games"];
    const CATEGORY_ICONS = {
      Proxies: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>',
      Education: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>',
      Games: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="15" y1="13" x2="15.01" y2="13"/><line x1="18" y1="11" x2="18.01" y2="11"/><rect x="2" y="6" width="20" height="12" rx="2"/></svg>',
      Other: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>'
    };
    async function fetchLinks() {
      try {
        const res = await fetch(LINKS_URL + "?v=" + Date.now());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        links = text.split("\n")
          .map(l => l.trim())
          .filter(l => l && !l.startsWith("#"))
          .map(l => {
            const p = l.split("|").map(s => s.trim());
            return p.length >= 3 ? { label: p[0], url: p[1], category: p[2] } : null;
          })
          .filter(Boolean);
        return true;
      } catch (err) {
        console.error("Failed to load links:", err);
        document.getElementById("links-container").innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
            </div>
            <p>Could not load links</p>
            <p class="sub">Check the GitHub raw URL or your internet connection</p>
          </div>`;
        document.getElementById("link-count").textContent = "Failed to load";
        document.getElementById("footer-text").textContent = "Prox Loader · Error loading links";
        return false;
      }
    }
    function getDomain(url) {
      try { return new URL(url).hostname; } catch { return url; }
    }
    function getFaviconUrl(url) {
      try {
        const hostname = new URL(url).hostname;
        return `https://icons.duckduckgo.com/ip3/${hostname}.ico`;
      } catch {
        return '';
      }
    }
    function handleFaviconError(img) {
      const letter = img.nextElementSibling;
      if (letter) {
        img.style.display = "none";
        letter.style.display = "flex";
      }
    }
    function filterLinks() {
      let filtered = links;
      if (activeCategory !== "All") {
        filtered = filtered.filter(l => l.category === activeCategory);
      }
      if (searchQuery.trim()) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(l =>
          l.label.toLowerCase().includes(q) ||
          l.url.toLowerCase().includes(q) ||
          l.category.toLowerCase().includes(q)
        );
      }
      return filtered;
    }
    function groupLinks(filtered) {
      const map = {};
      filtered.forEach(l => {
        (map[l.category] = map[l.category] || []).push(l);
      });
      return CATEGORY_ORDER
        .filter(c => map[c])
        .map(c => ({ category: c, links: map[c] }));
    }
    function createCard(link, idx) {
      const domain = getDomain(link.url);
      const initial = link.label.charAt(0).toUpperCase();
      const faviconSrc = getFaviconUrl(link.url);
      const a = document.createElement("a");
      a.href = link.url;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.className = "link-card";
      a.style.animationDelay = `${idx * 0.04}s`;
      a.innerHTML = `
        <div class="top-edge"></div>
        <div class="favicon-wrap">
          <img src="${faviconSrc}" alt="" width="24" height="24" loading="lazy" decoding="async" onerror="handleFaviconError(this)" />
        </div>
        <div class="card-text">
          <div class="name">${link.label}</div>
          <div class="domain">${domain}</div>
        </div>
        <svg class="ext-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>`;
      return a;
    }
    function render() {
      const filtered = filterLinks();
      const grouped = groupLinks(filtered);
      const container = document.getElementById("links-container");
      document.getElementById("link-count").textContent = `${links.length} curated links, Created by Epick`;
      document.getElementById("footer-text").textContent = `Prox Loader · ${filtered.length} of ${links.length} links`;
      document.getElementById("clear-btn").classList.toggle("visible", searchQuery.length > 0);
      container.innerHTML = "";
      if (grouped.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
              </svg>
            </div>
            <p>No links found</p>
            <p class="sub">Try a different search term or category</p>
          </div>`;
        return;
      }
      grouped.forEach((group, i) => {
        const sec = document.createElement("div");
        sec.className = "category";
        sec.style.animation = `fade-up 0.6s var(--ease) ${0.1 + i * 0.08}s both`;
        const icon = CATEGORY_ICONS[group.category] || CATEGORY_ICONS.Other;
        sec.innerHTML = `
          <div class="cat-header">
            <div class="cat-label">
              <span class="cat-icon">${icon}</span>
              <span>${group.category}</span>
            </div>
            <div class="cat-count">${group.links.length}</div>
            <div class="cat-line"></div>
          </div>`;
        const grid = document.createElement("div");
        grid.className = "cards-grid";
        group.links.forEach((link, j) => grid.appendChild(createCard(link, j)));
        sec.appendChild(grid);
        container.appendChild(sec);
      });
    }
    function initPills() {
      const el = document.getElementById("pills");
      ["All", ...CATEGORY_ORDER].forEach(cat => {
        const btn = document.createElement("button");
        btn.className = `pill${cat === "All" ? " active" : ""}`;
        btn.textContent = cat;
        btn.addEventListener("click", () => {
          activeCategory = cat;
          document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
          btn.classList.add("active");
          render();
        });
        el.appendChild(btn);
      });
    }
    const searchInput = document.getElementById("search-input");
    const searchWrap = document.getElementById("search-wrap");
    searchInput.addEventListener("input", e => {
      searchQuery = e.target.value;
      render();
    });
    searchInput.addEventListener("focus", () => searchWrap.classList.add("focused"));
    searchInput.addEventListener("blur", () => searchWrap.classList.remove("focused"));
    document.getElementById("clear-btn").addEventListener("click", () => {
      searchQuery = "";
      searchInput.value = "";
      searchInput.focus();
      render();
    });
    (async function boot() {
      const success = await fetchLinks();
      if (!success || links.length === 0) return;
      const seen = {};
      CATEGORY_ORDER.forEach(c => seen[c] = true);
      links.forEach(l => {
        if (!seen[l.category]) {
          CATEGORY_ORDER.push(l.category);
          seen[l.category] = true;
        }
      });
      initPills();
      render();
    })();
  </script>
</body>
</html>
